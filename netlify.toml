# Netlify Configuration for ACES Aerodynamics
# Production deployment configuration optimized for Next.js 15

[build]
  # Build command
  command = "npm run build"
  
  # Directory to publish (Next.js output)
  publish = ".next"
  
  # Node.js version - match package.json engines requirement
  [build.environment]
    NODE_VERSION = "22"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.images]
  compress = true

# Security and performance headers
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers (middleware.ts applies more comprehensive headers)
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    
    # Cache control for HTML pages
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache static assets aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache fonts aggressively
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/public/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects for canonical URL (www to non-www or vice versa)
# Commented out - Netlify handles HTTPS automatically
# [[redirects]]
#   from = "https://acesaerodynamics.com/*"
#   to = "https://www.acesaerodynamics.com/:splat"
#   status = 301
#   force = true

# Trailing slash redirects handled by Next.js - removed to prevent loops

# Functions configuration (if using Netlify Functions in future)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Plugin configuration
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Development server configuration
[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000
  publish = ".next"
  autoLaunch = false
